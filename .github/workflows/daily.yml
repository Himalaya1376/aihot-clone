name: 每日 AI 新闻自动采集

on:
  schedule:
    # 每天北京时间早上 8 点运行（UTC 时间 0 点）
    - cron: '0 0 * * *'
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install feedparser requests supabase python-dotenv
      
      - name: 抓取 RSS 数据
        run: python fetch_news.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: AI 处理数据
        run: python process_with_ai.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}